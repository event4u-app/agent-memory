# C4 · runtime-trust — weekly digest → Slack.
#
# Template workflow. Copy to `.github/workflows/memory-weekly-digest.yml`
# in your project, set the two secrets (DATABASE_URL, SLACK_WEBHOOK_URL),
# adjust the cron, and commit.
#
# Contract-stable: the `--format slack-block-kit` output is pinned by
# `review-weekly-v1` in @event4u/agent-memory. See this directory's
# README for the full rundown.

name: memory · weekly digest

on:
  schedule:
    # Mondays 09:00 UTC. Edit to match your team's rhythm.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Pin the memory version you're running in prod. Bump intentionally.
      MEMORY_VERSION: "1.1.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pre-flight · memory doctor
        run: |
          npx --yes --package=@event4u/agent-memory@${{ env.MEMORY_VERSION }} \
            memory doctor

      - name: Build Slack payload
        id: digest
        run: |
          set -euo pipefail
          # stdout = Slack Block Kit JSON; stderr = human diagnostics.
          PAYLOAD=$(
            npx --yes --package=@event4u/agent-memory@${{ env.MEMORY_VERSION }} \
              memory review --weekly --format slack-block-kit
          )
          # Skip the Slack step when the digest is empty (no cases).
          CASE_COUNT=$(echo "$PAYLOAD" | jq '[.blocks[]? | select(.type=="section")] | length')
          echo "case_count=$CASE_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "payload<<EOF"
            echo "$PAYLOAD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        if: steps.digest.outputs.case_count != '0'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: ${{ steps.digest.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
