# Docker sidecar for a Django application.
#
# Merge these two services into the compose file your Django app already
# runs. Keep `depends_on: agent-memory: service_healthy` on your web
# service so Django doesn't boot before the sidecar finishes migrations.
#
# `REPO_ROOT=/workspace` + the read-only mount lets file-exists and
# symbol-exists validators resolve memory entries against your actual
# Python source. Without it those validators fail-closed on every propose.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d agent_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-memory:
    # For a release-tracked setup, pin a tag instead of `latest`.
    image: ghcr.io/event4u-app/agent-memory:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/agent_memory
      LOG_LEVEL: info
      REPO_ROOT: /workspace
    volumes:
      - .:/workspace:ro
    # Default CMD is `memory serve` — supervisor that applies pending
    # migrations on start, then idles until SIGTERM (see ADR-0002).
    healthcheck:
      test: ["CMD", "memory", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Your Django app service ────────────────────────────────────────────
  # Uncomment and adapt. `depends_on: service_healthy` is the key guard.
  #
  # web:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: python manage.py runserver 0.0.0.0:8000
  #   depends_on:
  #     agent-memory:
  #       condition: service_healthy
  #   environment:
  #     AGENT_MEMORY_SERVICE: agent-memory
  #     AGENT_MEMORY_REPOSITORY: my-django-app
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - .:/app

volumes:
  pgdata:
