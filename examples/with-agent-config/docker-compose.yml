# Example — agent-config (host-side skills) + agent-memory (containerised).
#
# agent-config is installed into node_modules on the host via npm —
# its role is to hydrate .augment/skills/ at install time. No service
# runs for it.
#
# agent-memory runs as a sidecar: postgres + the published image. The
# stack matches examples/laravel-sidecar/ so consumers who saw that
# example recognise the pattern.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d agent_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-memory:
    image: ghcr.io/event4u-app/agent-memory:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/agent_memory
      LOG_LEVEL: info
      REPO_ROOT: /workspace
    volumes:
      - .:/workspace:ro
    healthcheck:
      test: ["CMD", "memory", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
