# Documentation / portability drift guards.
#
# Each job verifies that a piece of committed prose still matches its
# source of truth. If the source changes, the matching doc has to be
# regenerated (or the prose fixed) in the same PR.
#
# Jobs:
#   cli-doc-drift   (P4-2)  docs/cli-reference.md vs src/cli/index.ts
#   portability     (P4-3)  README/docs/examples vs foreign-project blocklist
#   link-check      (P4-4)  every *.md link resolves
#   mcp-tools       (P6-2)  README MCP-tool table vs src/mcp/tool-definitions.ts
#   cli-commands    (P6-3)  README CLI list vs src/cli/index.ts
#   neutral-docs    (P6-4)  pure-knowledge docs stay stack-agnostic
#   changelog       (P6-6)  package.json version has a CHANGELOG section
#   secret-patterns (II1)   docs/secret-safety.md vs secret-patterns.ts
#   entropy-eval    (II2)   docs/security/entropy-calibration.md vs corpus
#
# Runs on every pull request + on push to main. Fast (~2 min total) —
# these are static checks, no Docker, no Postgres.

name: Docs checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cli-doc-drift:
    name: CLI doc drift (P4-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Regenerate CLI reference
        run: npm run docs:cli

      - name: Fail on drift
        run: |
          if ! git diff --exit-code docs/cli-reference.md; then
            echo ""
            echo "::error::docs/cli-reference.md is out of sync with src/cli/index.ts."
            echo "::error::Run \`npm run docs:cli\` locally and commit the diff."
            echo "::error::See roadmap task P4-1 for the generator contract."
            exit 1
          fi

  portability:
    name: Portability guard (P4-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm deps (for the bundled check_portability.py)
        run: npm ci --ignore-scripts

      - name: Scan AGENTS.md + copilot-instructions.md for foreign-project leakage
        run: npm run check:portability

  link-check:
    name: Link checker (P4-4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee — fail on any broken relative or external link
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            README.md
            AGENTS.md
            CHANGELOG.md
            docs
            examples
            agents/roadmaps/archive/improve-setup.md
            .github/copilot-instructions.md
          fail: true
        env:
          # Raise the rate limit for GitHub anchor checks; lychee falls
          # back to anonymous requests otherwise and hits 60-req/h.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mcp-tools:
    name: MCP tool-count guard (P6-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:mcp-tools

  cli-commands:
    name: CLI command-count guard (P6-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:cli-commands

  neutral-docs:
    name: Neutral-docs guard (P6-4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:neutral-docs

  changelog:
    name: CHANGELOG freshness guard (P6-6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:changelog

  secret-patterns:
    name: Secret-pattern doc drift (II1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Regenerate pattern catalog table
        run: npm run docs:secrets

      - name: Fail on drift
        run: |
          if ! git diff --exit-code docs/secret-safety.md; then
            echo ""
            echo "::error::docs/secret-safety.md is out of sync with src/security/secret-patterns.ts."
            echo "::error::Run \`npm run docs:secrets\` locally and commit the diff."
            echo "::error::See roadmap task II1 in agents/roadmaps/secret-safety.md."
            exit 1
          fi

  embedding-boundary:
    name: Provider-boundary drift guard (III4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:embedding-boundary

  entropy-eval:
    name: Entropy calibration drift (II2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Re-run entropy calibration against corpus
        run: npm run entropy:eval

      - name: Fail on drift
        run: |
          if ! git diff --exit-code docs/security/entropy-calibration.md; then
            echo ""
            echo "::error::docs/security/entropy-calibration.md is out of sync with the corpus or guard."
            echo "::error::Run \`npm run entropy:eval\` locally and commit the diff."
            echo "::error::See roadmap task II2 in agents/roadmaps/secret-safety.md."
            exit 1
          fi
