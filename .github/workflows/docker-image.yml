# Build & publish the agent-memory runtime image to GHCR.
#
# Triggers:
#   - push to main             → :main + :sha-<short>
#   - tag v*                   → :vX.Y.Z + :X.Y + :latest + :sha-<short>
#   - manual dispatch          → :manual-<sha>
#   - pull_request             → build-only, no push (smoke validation)
#
# Multi-arch: linux/amd64 + linux/arm64 via buildx. Layer cache is shared
# across runs through the GHA cache backend so rebuilds stay cheap.

name: Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tsconfig.json"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build${{ github.event_name == 'pull_request' && ' (no push)' || ' + push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-memory
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=@event4u/agent-memory
            org.opencontainers.image.description=Persistent, trust-scored project memory for AI coding agents
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Smoke-test amd64 image
        if: github.event_name != 'pull_request'
        run: |
          set -e
          IMAGE="ghcr.io/${{ github.repository_owner }}/agent-memory:sha-$(git rev-parse --short HEAD)"
          echo "Pulling $IMAGE"
          docker pull --platform linux/amd64 "$IMAGE"
          echo "=== memory --version ==="
          docker run --rm --platform linux/amd64 --entrypoint memory "$IMAGE" --version
          echo "=== memory --help (head) ==="
          docker run --rm --platform linux/amd64 --entrypoint memory "$IMAGE" --help | head -10
